# Create a GitHub Release when a version tag is pushed.
# The release body is extracted from the matching CHANGELOG.md section.
# Per-push and per-PR builds live in build.yml.
#
# Usage:
#   git tag v0.1.0
#   git push origin main --tags

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building zip for version: $VERSION"

      - name: Build zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="PalworldInstaller-${VERSION}.zip"
          mkdir -p release-artifacts
          zip -r "release-artifacts/${ZIP_NAME}" plugins/ \
            -x 'plugins/.DS_Store' \
               '*/__pycache__/*' \
               '*/.vs/*' \
               '*/.DS_Store'
          echo "Artifact contents:"
          unzip -l "release-artifacts/${ZIP_NAME}"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract section between "## [X.Y.Z]" and the next "## [" header.
          # Adapted verbatim from pocket-islands' release workflow.
          CHANGELOG=$(awk -v ver="$VERSION" '
            BEGIN { found=0; content="" }
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { content = content $0 "\n" }
            END { print content }
          ' CHANGELOG.md)

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "Extracted changelog for v$VERSION:"
          echo "$CHANGELOG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          fail_on_unmatched_files: false
          files: |
            release-artifacts/*.zip
